name: deploy — checkout-service

on:
  push:
    tags:
      - "checkout-service/v*"
    branches:
      - main
    paths:
      - "src/checkout-service/**"
      - "deployments/k8s/base/checkout-service/**"
  workflow_dispatch:
    inputs:
      semver_tag:
        description: "Semver tag to deploy (e.g. v1.2.3). Leave empty for a branch deploy."
        required: false
        default: ""

jobs:
  deploy:
    uses: ./.github/workflows/_build-and-deploy.yml
    with:
      service: checkout-service
      dockerfile: src/checkout-service/Dockerfile
      semver_tag: >-
        ${{
          github.event_name == 'workflow_dispatch' && inputs.semver_tag != '' && inputs.semver_tag ||
          startsWith(github.ref, 'refs/tags/checkout-service/') && github.ref_name != '' &&
          github.ref_name || ''
        }}
    secrets: inherit
