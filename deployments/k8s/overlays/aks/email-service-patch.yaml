apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
spec:
  template:
    spec:
      containers:
        - name: email-service
          env:
            - name: EMAIL_BACKEND
              value: "smtp"
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: smtp-host
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: smtp-user
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: smtp-password
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: email-service-secrets
                  key: email-from
