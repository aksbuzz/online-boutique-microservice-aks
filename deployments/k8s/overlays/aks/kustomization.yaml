apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

components:
  - ../../components/workload-identity

patches:
  - path: email-service-patch.yaml
    target:
      kind: Deployment
      name: email-service
  - path: catalog-service-patch.yaml
    target:
      kind: Deployment
      name: catalog-service
  - path: payment-service-patch.yaml
    target:
      kind: Deployment
      name: payment-service