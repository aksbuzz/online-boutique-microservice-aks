apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-email-ingress
spec:
  podSelector:
    matchLabels:
      app: email-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: checkout-service
      ports:
        - port: 5003