apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:latest
          ports:
            - containerPort: 5002
          env:
            - name: PG_HOST
              value: "localhost"
            - name: PG_DATABASE
              value: "catalog"
            - name: PG_USER
              value: "catalog_user"