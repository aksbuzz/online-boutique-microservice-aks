services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass

  cart-service:
    build:
      context: ../../
      dockerfile: src/cart-service/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  catalog-service:
    build:
      context: ../../
      dockerfile: src/catalog-service/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - PG_HOST=postgres
      - PG_DATABASE=catalog
      - PG_USER=catalog_user
      - PG_PASSWORD=catalog_pass
    depends_on:
      - postgres

  email-service:
    build:
      context: ../../
      dockerfile: src/email-service/Dockerfile
    ports:
      - "5003:5003"
    environment:
      - EMAIL_BACKEND=log

  shipping-service:
    build:
      context: ../../
      dockerfile: src/shipping-service/Dockerfile
    ports:
      - "5004:5004"

  currency-service:
    build:
      context: ../../
      dockerfile: src/currency-service/Dockerfile
    ports:
      - "5005:5005"

  payment-service:
    build:
      context: ../../
      dockerfile: src/payment-service/Dockerfile
    ports:
      - "5006:5006"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set in .env}

  recommendation-service:
    build:
      context: ../../
      dockerfile: src/recommendation-service/Dockerfile
    ports:
      - "5007:5007"
    environment:
      - CATALOG_SERVICE_ADDR=catalog-service:5002
    depends_on:
      - catalog-service

  checkout-service:
    build:
      context: ../../
      dockerfile: src/checkout-service/Dockerfile
    ports:
      - "5008:5008"
    environment:
      - CART_SERVICE_ADDR=cart-service:5001
      - CATALOG_SERVICE_ADDR=catalog-service:5002
      - CURRENCY_SERVICE_ADDR=currency-service:5005
      - EMAIL_SERVICE_ADDR=email-service:5003
      - PAYMENT_SERVICE_ADDR=payment-service:5006
      - SHIPPING_SERVICE_ADDR=shipping-service:5004
    depends_on:
      - cart-service
      - catalog-service
      - currency-service
      - email-service
      - payment-service
      - shipping-service

  envoy:
    image: envoyproxy/envoy:v1.32-latest
    volumes:
      - ../envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"
      - "9901:9901"   # Envoy admin UI
    depends_on:
      - catalog-service
      - cart-service
      - currency-service
      - recommendation-service
      - checkout-service

  frontend-service:
    build:
      context: ../../
      dockerfile: src/frontend-service/Dockerfile
      args:
        - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY:?VITE_STRIPE_PUBLISHABLE_KEY must be set in .env}
    ports:
      - "3000:80"
    depends_on:
      - envoy